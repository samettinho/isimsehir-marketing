  <style>
    body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:#0e0f13;color:#fff;gap:28px}
    h1{font-size:22px;font-weight:700;margin:0;letter-spacing:.5px}
    .cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
    a.card{display:block;width:260px;padding:28px 24px;border-radius:16px;text-decoration:none;color:#fff;
      background:linear-gradient(135deg,#7c3aed,#2563eb);box-shadow:0 10px 30px rgba(0,0,0,.4);
      transition:transform .15s ease}
    a.card:hover{transform:translateY(-4px)}
    a.card b{font-size:18px;display:block;margin-bottom:6px}
    a.card span{font-size:13px;opacity:.85}
    a.card.viral{background:linear-gradient(135deg,#1a1a12,#0c0c10);border:1.5px solid #c8f000;position:relative;overflow:hidden}
    a.card.viral b{color:#c8f000}
    a.card.viral .new{position:absolute;top:12px;right:-30px;transform:rotate(35deg);background:#c8f000;color:#101007;
      font-size:11px;font-weight:800;letter-spacing:.08em;padding:4px 34px}
  </style>
</head>
